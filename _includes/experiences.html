<section class="pt-12 fade-up delay-2">
    <h2 class="font-serif text-xl font-semibold text-zinc-900 dark:text-white mb-6">{{ include.title }}</h2>

    {% assign experiences = include.experiences %}
    <div class="flex flex-col gap-4">
        {% for experience in experiences %}
        <div class="flex items-start gap-4">
            <div class="mt-0.5 shrink-0 w-9 h-9 bg-zinc-200 dark:bg-zinc-700 flex items-center justify-center text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase overflow-hidden rounded-full">
                <img src="{{ experience.logo }}" alt="{{ experience.institution }}" class="w-full h-full rounded-full object-contain p-1" />
            </div>
            <div class="flex-1 flex items-start justify-between">
                <div>
                    <p class="text-sm font-medium text-zinc-900 dark:text-zinc-100">{{ experience.institution }}</p>
                    <p class="text-xs text-zinc-500 dark:text-zinc-400">{{ experience.location }}</p>
                    <p class="text-xs text-zinc-500 dark:text-zinc-400">{{ experience.position }}</p>
                </div>
                <span class="text-xs text-zinc-400 dark:text-zinc-500 whitespace-nowrap ml-4">{{ experience.date }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
</section>
